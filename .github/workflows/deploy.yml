name: Deploy to Server

on:
  push:
    branches: [ master-zy ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
        
    - name: Create deployment package
      run: |
        # 创建部署包，排除构建文件
        tar --exclude='sharp-ico-vue/node_modules' \
            --exclude='sharp-ico-vue/dist' \
            --exclude='SharpIcoWeb/bin' \
            --exclude='SharpIcoWeb/obj' \
            --exclude='SharpIco/bin' \
            --exclude='SharpIco/obj' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.zip' \
            --exclude='*.tar.gz' \
            -czf deployment.tar.gz .
            
    - name: Upload files to server
      run: |
        scp deployment.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SERVER_IP }}:/www/wwwroot/default/sharp-ico/
        
    - name: Deploy on server
      run: |
        ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SERVER_IP }} << 'EOF'
          cd /www/wwwroot/default/sharp-ico
          
          # 解压新的部署包
          tar -xzf deployment.tar.gz -C .
          
          # 停止现有容器
          docker-compose down
          
          # 构建并启动新容器
          docker-compose up -d --build
          
          # 清理部署包
          rm -f deployment.tar.gz
          
          echo "Deployment completed successfully!"
        EOF