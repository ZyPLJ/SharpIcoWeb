name: Deploy to Server

on:
  push:
    branches: [ master-zy ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
        
    - name: Create deployment package
      run: |
        # 创建临时目录用于打包
        mkdir -p temp_deploy
        
        # 复制需要的文件到临时目录
        cp -r sharp-ico-vue temp_deploy/ 2>/dev/null || true
        cp -r SharpIcoWeb temp_deploy/ 2>/dev/null || true
        cp -r SharpIco temp_deploy/ 2>/dev/null || true
        cp compose.yaml temp_deploy/ 2>/dev/null || true
        cp .dockerignore temp_deploy/ 2>/dev/null || true
        
        # 排除构建文件
        rm -rf temp_deploy/sharp-ico-vue/node_modules 2>/dev/null || true
        rm -rf temp_deploy/sharp-ico-vue/dist 2>/dev/null || true
        rm -rf temp_deploy/SharpIcoWeb/bin 2>/dev/null || true
        rm -rf temp_deploy/SharpIcoWeb/obj 2>/dev/null || true
        rm -rf temp_deploy/SharpIco/bin 2>/dev/null || true
        rm -rf temp_deploy/SharpIco/obj 2>/dev/null || true
        
        # 创建部署包
        cd temp_deploy
        tar -czf ../deployment.tar.gz .
        cd ..
        
        # 清理临时目录
        rm -rf temp_deploy
            
    - name: Upload files to server
      run: |
        scp deployment.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SERVER_IP }}:/www/wwwroot/default/sharp-ico/
        
    - name: Deploy on server
      run: |
        ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SERVER_IP }} << 'EOF'
          cd /www/wwwroot/default/sharp-ico
          
          # 解压新的部署包
          tar -xzf deployment.tar.gz -C .
          
          # 停止现有容器
          docker-compose down
          
          # 构建并启动新容器
          docker-compose up -d --build
          
          # 清理部署包
          rm -f deployment.tar.gz
          
          echo "Deployment completed successfully!"
        EOF