<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    
    <!-- 视口设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- SEO 基础信息 -->
    <title>在线图片转ICO工具 - 免费PNG/JPG转ICO图标生成器 | Sharp ICO</title>
    <meta name="description" content="Sharp ICO - 免费在线图片转ICO工具，支持PNG、JPG格式一键转换为多尺寸ICO图标文件。无需下载软件，快速生成favicon.ico，支持16x16、32x32、48x48等标准尺寸。" />
    <meta name="keywords" content="图片转ICO,在线ICO转换,PNG转ICO,JPG转ICO,favicon生成,ICO图标制作,免费ICO工具,Sharp ICO" />
    <meta name="author" content="Sharp ICO Team" />
      
    <!-- 预加载和预连接 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
    <!-- 网站图标 -->
    <link rel="icon" type="image/x-icon" href="/logo.ico" />
    <link rel="icon" type="image/x-icon" sizes="32x32" href="/logo.ico" />
    <link rel="icon" type="image/x-icon" sizes="16x16" href="/logo.ico" />
      
    <!-- 性能提示 -->
    <link rel="prefetch" href="/src/components/SharpIco.vue" />

    <!-- 结构化数据 -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebApplication",
            "name": "Sharp ICO",
            "alternateName": "在线图片转ICO工具",
            "description": "免费在线图片转ICO工具，支持PNG、JPG格式一键转换为多尺寸ICO图标文件",
            "url": "https://ico.pljzy.top",
            "applicationCategory": "GraphicsApplication",
            "operatingSystem": "Any",
            "permissions": "无需安装",
            "offers": {
                "@type": "Offer",
                "price": "0",
                "priceCurrency": "CNY"
            },
            "creator": {
                "@type": "Organization",
                "name": "Sharp ICO Team"
            }
        }
    </script>
      
    <style>
      @keyframes spin {
          to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- 页面加载提示 -->
    <noscript>
      <div style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 20px;
      ">
        <div>
          <h1 style="color: #333; margin-bottom: 16px;">需要启用 JavaScript</h1>
          <p style="color: #666; line-height: 1.5;">
            此应用需要 JavaScript 才能正常运行。<br>
            请在您的浏览器设置中启用 JavaScript，然后刷新页面。
          </p>
        </div>
      </div>
    </noscript>
    
    <!-- 主应用容器 -->
    <div id="app">
      <!-- 初始加载骨架屏 -->
      <div id="app-loading" style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      ">
        <div style="text-align: center;">
          <div style="
            width: 40px;
            height: 40px;
            border: 3px solid #e8f0ff;
            border-top-color: #4c84ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
          "></div>
          <p style="color: #666; font-family: system-ui, sans-serif;">加载中...</p>
        </div>
      </div>
    </div>
    
    <!-- 应用脚本 -->
    <script type="module" src="/src/main.js"></script>
    
    <!-- 移除加载屏幕 -->
    <script>
      // 当 Vue 应用挂载后移除加载屏幕
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const loading = document.getElementById('app-loading');
          if (loading) {
            loading.style.opacity = '0';
            loading.style.transition = 'opacity 0.3s ease';
            setTimeout(() => loading.remove(), 300);
          }
        }, 1000); // 最少显示1秒
      });
    </script>
  </body>
</html>
