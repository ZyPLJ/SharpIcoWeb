    <link rel="icon" type="image/x-icon" href="/logo.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- 主题颜色 -->
    <meta name="theme-color" content="#4c84ff" />
    <meta name="msapplication-TileColor" content="#4c84ff" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- 安全性 -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- 预加载和预连接 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- 结构化数据 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Sharp ICO",
      "alternateName": "在线图片转ICO工具",
      "description": "免费在线图片转ICO工具，支持PNG、JPG格式一键转换为多尺寸ICO图标文件",
      "url": "https://your-domain.com",
      "applicationCategory": "GraphicsApplication",
      "operatingSystem": "Any",
      "permissions": "无需安装",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "CNY"
      },
      "creator": {
        "@type": "Organization",
        "name": "Sharp ICO Team"
      }
    }
    </script>
    
    <!-- 性能提示 -->
    <link rel="prefetch" href="/src/components/SharpIco.vue" />
  </head>
  <body>
    <!-- 页面加载提示 -->
    <noscript>
      <div style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 20px;
      ">
        <div>
          <h1 style="color: #333; margin-bottom: 16px;">需要启用 JavaScript</h1>
          <p style="color: #666; line-height: 1.5;">
            此应用需要 JavaScript 才能正常运行。<br>
            请在您的浏览器设置中启用 JavaScript，然后刷新页面。
          </p>
        </div>
      </div>
    </noscript>
    
    <!-- 主应用容器 -->
    <div id="app">
      <!-- 初始加载骨架屏 -->
      <div id="app-loading" style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      ">
        <div style="text-align: center;">
          <div style="
            width: 40px;
            height: 40px;
            border: 3px solid #e8f0ff;
            border-top-color: #4c84ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
          "></div>
          <p style="color: #666; font-family: system-ui, sans-serif;">加载中...</p>
        </div>
        
        <style>
          @keyframes spin {
            to { transform: rotate(360deg); }
          }
        </style>
      </div>
    </div>
    
    <!-- 应用脚本 -->
    <script type="module" src="/src/main.js"></script>
    
    <!-- 移除加载屏幕 -->
    <script>
      // 当 Vue 应用挂载后移除加载屏幕
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const loading = document.getElementById('app-loading');
          if (loading) {
            loading.style.opacity = '0';
            loading.style.transition = 'opacity 0.3s ease';
            setTimeout(() => loading.remove(), 300);
          }
        }, 1000); // 最少显示1秒
      });
    </script>
    
    <!-- 错误处理 -->
    <script>
      window.addEventListener('error', (event) => {
        console.error('Global error:', event.error);
        // 可以在这里发送错误到监控服务
      });
      
      window.addEventListener('unhandledrejection', (event) => {
        console.error('Unhandled promise rejection:', event.reason);
        // 可以在这里发送错误到监控服务
      });
    </script>
  </body>
</html>
